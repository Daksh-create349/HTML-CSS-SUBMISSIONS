<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* GLOBAL */
body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:#fff;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    top:0;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
}

.menu{
    list-style:none;
    display:flex;
    gap:40px;
}

.menu li{
    cursor:pointer;
    position:relative;
    font-weight:500;
}

.menu li::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-6px;
    width:0%;
    height:2px;
    background:#fff;
    transition:0.4s;
}

.menu li:hover::after{
    width:100%;
}

/* HERO */
.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:60px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:20px;
}

.hero p{
    font-size:18px;
    opacity:0.8;
}

/* GALLERY */
.gallery{
    padding:120px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.photo{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.6s;
}

.photo:hover img{
    transform:scale(1.1);
}

/* Overlay */
.photo::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
    opacity:0;
    transition:0.5s;
}

.photo::after{
    content:"Explore";
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:18px;
    font-weight:500;
    opacity:0;
    transition:0.5s;
}

.photo:hover::before,
.photo:hover::after{
    opacity:1;
}

/* FOOTER */
footer{
    background:#111;
    text-align:center;
    padding:30px;
    font-size:14px;
    letter-spacing:1px;
}

/* RESPONSIVE */
@media(max-width:768px){

    .hero h1{
        font-size:38px;
    }

    nav{
        padding:20px;
        flex-direction:column;
        gap:10px;
    }

    .gallery{
        padding:100px 20px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="logo">DAKSH PHOTOGRAPHY</div>
    <ul class="menu">
        <li>Home</li>
        <li>Gallery</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <div>
        <h1>Capturing Light & Emotion</h1>
        <p>Turning moments into timeless memories.</p>
    </div>
</section>

<section class="gallery">

<div class="photo">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1500534623283-312aade485b7">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1482192596544-9eb780fc7f66">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
</div>

<div class="photo">
<img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e">
</div>

</section>

<footer>
© 2026 Made by Daksh Srivastava
</footer>

</body>
</html>
